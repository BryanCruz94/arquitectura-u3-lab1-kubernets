apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres-medico
  labels:
    app: postgres-medico

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres-medico

  template:
    metadata:
      labels:
        app: postgres-medico

    spec:
      containers:
        - name: postgres

          image: postgres:17
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 5432

          envFrom:
            - secretRef:
                name: postgres-secret-medico

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          volumeMounts:
            - name: postgres-storage
              mountPath: "/var/lib/postgresql/data"

          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 10
            periodSeconds: 5

      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgress-pvc-medico
